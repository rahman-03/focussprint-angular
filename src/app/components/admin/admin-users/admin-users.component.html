<div class="d-flex justify-content-center mt-5">
    <div class="list-group">
        <h4 class="text-center fw-bold mb-4">Users List</h4>
        <!-- Task List -->
        @for (u of users; track u.id) {
            <a class="list-group-item list-group-item-action d-flex ustify-content-between align-items-center py-3" [routerLink]="['/admin/users',u.id]">
                <div class="flex-grow-1 text-truncate-container">
                    
                    <div class="fw-semibold user-name">
                    {{ u.firstname | titlecase}} {{u.lastname | titlecase}}
                    </div>

                    <div class="text-muted small text-break">
                    {{ u.email }}
                    </div>

                </div>

                @if (!u.is_active) {
                    <span class="badge bg-cus-dis me-2 flex-shrink-0">Disabled</span>
                }

                <span
                    class="badge me-2 flex-shrink-0"
                    [ngClass]="u.role == 'admin' ? 'bg-cus-admin' : 'bg-cus-other'"
                >
                    {{u.role | titlecase}}
                </span>
            </a>
        }
        @empty {
            <a
            class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3"
            [routerLink]="['/home']"
            >
            <span class="flex-grow-1">
                No Users Found
            </span>
            </a>
        }
    </div>
</div>
